<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
<rect width="1200" height="560" fill="#f6f1e8"/><text x="70" y="70" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#132b2f">靶点罗盘：从问题到立项假设</text><text x="70" y="105" font-family="Arial,sans-serif" font-size="16" fill="#587075">证据进入系统，经过标准化与质询，最终形成可复核的研发讨论材料</text>
<g font-family="Arial,sans-serif"><g fill="#fff" stroke="#c9d4cf" stroke-width="2"><rect x="70" y="175" width="210" height="150" rx="8"/><rect x="340" y="175" width="210" height="150" rx="8"/><rect x="610" y="175" width="210" height="150" rx="8"/><rect x="880" y="175" width="250" height="150" rx="8"/></g>
<g fill="#d66b45"><circle cx="110" cy="215" r="18"/><circle cx="380" cy="215" r="18"/><circle cx="650" cy="215" r="18"/><circle cx="920" cy="215" r="18"/></g><g fill="#fff" font-size="16" font-weight="700" text-anchor="middle"><text x="110" y="221">1</text><text x="380" y="221">2</text><text x="650" y="221">3</text><text x="920" y="221">4</text></g>
<g fill="#132b2f" font-size="20" font-weight="700"><text x="100" y="265">提出问题</text><text x="370" y="265">标准化对象</text><text x="640" y="265">检索与质询</text><text x="910" y="265">形成判断</text></g><g fill="#587075" font-size="15"><text x="100" y="294">靶点 / 癌种 / 药物形式</text><text x="100" y="316">或自然语言追问</text><text x="370" y="294">别名、试验、药物</text><text x="370" y="316">患者与适应症消歧</text><text x="640" y="294">论文、试验、标签</text><text x="640" y="316">支持、反向与冲突证据</text><text x="910" y="294">靶点卡片、风险清单</text><text x="910" y="316">差异化假设、验证问题</text></g>
<g stroke="#d66b45" stroke-width="3" fill="none"><path d="M280 250h55"/><path d="M550 250h55"/><path d="M820 250h55"/></g><g fill="#d66b45"><path d="M330 242l12 8-12 8z"/><path d="M600 242l12 8-12 8z"/><path d="M870 242l12 8-12 8z"/></g>
<rect x="70" y="390" width="1060" height="80" rx="8" fill="#132b2f"/><text x="100" y="425" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#f6f1e8">每条关键结论都保留：来源 · 原文定位 · 适用条件 · 发布时间 · 证据等级 · 复核状态</text><text x="100" y="453" font-family="Arial,sans-serif" font-size="15" fill="#b9cbc4">证据不足时显示缺口，不以模型记忆补全结论；新资料通过版本 Diff 进入复核。</text></g></svg>
