<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
<rect width="1200" height="620" fill="#132b2f"/><text x="70" y="70" font-family="Arial,sans-serif" font-size="30" font-weight="700" fill="#f6f1e8">知识卡片不是摘要，而是一张证据地图</text><text x="70" y="105" font-family="Arial,sans-serif" font-size="16" fill="#b9cbc4">围绕“靶点-适应症-患者-药物形式”连接正向、反向和待验证关系</text>
<g stroke="#78958b" stroke-width="2" opacity=".8"><path d="M600 310L270 190"/><path d="M600 310L930 180"/><path d="M600 310L230 420"/><path d="M600 310L960 440"/><path d="M600 310L600 150"/><path d="M600 310L600 500"/></g>
<g font-family="Arial,sans-serif" text-anchor="middle"><circle cx="600" cy="310" r="92" fill="#d66b45"/><text x="600" y="302" font-size="26" font-weight="700" fill="#fff">靶点</text><text x="600" y="330" font-size="16" fill="#fff">适应症分析单元</text>
<g fill="#f6f1e8" stroke="#d66b45" stroke-width="3"><circle cx="270" cy="190" r="64"/><circle cx="930" cy="180" r="64"/><circle cx="230" cy="420" r="64"/><circle cx="960" cy="440" r="64"/><circle cx="600" cy="150" r="64"/><circle cx="600" cy="500" r="64"/></g>
<g fill="#132b2f" font-size="18" font-weight="700"><text x="270" y="185">机制与表达</text><text x="270" y="209" font-size="13" font-weight="400">因果 / 组学 / 正常组织</text><text x="930" y="175">患者与标志物</text><text x="930" y="199" font-size="13" font-weight="400">筛选 / 异质性 / 阈值</text><text x="230" y="415">药物与临床</text><text x="230" y="439" font-size="13" font-weight="400">形式 / 疗效 / 安全</text><text x="960" y="435">反向证据</text><text x="960" y="459" font-size="13" font-weight="400">失败 / 耐药 / 冲突</text><text x="600" y="145">竞争格局</text><text x="600" y="169" font-size="13" font-weight="400">项目 / 阶段 / 空白</text><text x="600" y="495">验证与差异化</text><text x="600" y="519" font-size="13" font-weight="400">假设 / 实验 / 专家复核</text></g></g>
<rect x="70" y="565" width="1060" height="2" fill="#d66b45"/><text x="70" y="595" font-family="Arial,sans-serif" font-size="14" fill="#b9cbc4">橙色：核心决策节点　米白：可展开证据模块　连线：带来源和时间属性的知识关系</text></svg>
